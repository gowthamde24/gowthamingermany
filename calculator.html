<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Grade Calculator | Gowtham IN Germany</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#e11d48', // Rose-600
            dark: '#0f172a',  // Slate-900
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* Hide number input arrows */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>

<body class="bg-dark text-slate-200 antialiased min-h-screen flex flex-col">

  <nav class="w-full border-b border-white/10 bg-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between p-4">
      <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Back to Home
      </a>
      <span class="font-bold text-white">German Grade <span class="text-brand">Calculator</span></span>
    </div>
  </nav>

  <section class="flex-grow flex items-center justify-center py-12 px-6 relative overflow-hidden">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-brand blur-[120px] opacity-15 w-[500px] h-[500px] rounded-full -z-10"></div>

    <div class="max-w-xl w-full">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-2">Calculate Your Grade</h1>
        <p class="text-slate-400 text-sm md:text-base">Enter your university's grading scale details below.</p>
      </div>

      <div class="glass-card p-6 md:p-8 rounded-3xl shadow-2xl">
        <form id="gradeForm" class="space-y-6">
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Quick Presets</label>
            <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="applyPreset(10, 4)" class="py-2 rounded-lg border border-slate-600 hover:border-brand hover:bg-brand/10 text-slate-300 hover:text-white text-sm transition">
                    Standard CGPA (10/4)
                </button>
                <button type="button" onclick="applyPreset(100, 35)" class="py-2 rounded-lg border border-slate-600 hover:border-brand hover:bg-brand/10 text-slate-300 hover:text-white text-sm transition">
                    Standard % (100/35)
                </button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-6">
              <div>
                  <label class="block text-sm font-medium text-slate-300 mb-2">Max Possible Score</label>
                  <input type="number" step="any" id="maxScore" value="10" class="w-full bg-black/40 border border-slate-600 rounded-xl p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition" placeholder="e.g. 10">
              </div>
              <div>
                  <label class="block text-sm font-medium text-slate-300 mb-2">Min Passing Score</label>
                  <input type="number" step="any" id="minScore" value="4" class="w-full bg-black/40 border border-slate-600 rounded-xl p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition" placeholder="e.g. 4">
              </div>
          </div>

          <div>
              <label class="block text-sm font-medium text-brand mb-2 font-bold">Your Obtained Score</label>
              <input type="number" step="any" id="myScore" class="w-full bg-brand/5 border border-brand/50 rounded-xl p-4 text-white text-xl font-bold focus:ring-2 focus:ring-brand outline-none transition placeholder-slate-600" placeholder="e.g. 8.5">
          </div>

          <button type="button" onclick="calculateGrade()" class="w-full py-4 rounded-xl bg-gradient-to-r from-brand to-rose-600 font-bold text-white text-lg hover:shadow-lg hover:shadow-brand/25 transition transform active:scale-95">
            Calculate Result
          </button>
        </form>

        <div id="resultBox" class="hidden mt-8 pt-8 border-t border-white/10 text-center animate-fade-in">
          <p class="text-slate-400 text-xs uppercase tracking-widest mb-2">Your German Grade Equivalent</p>
          <div class="text-6xl font-black text-white mb-3 tracking-tight" id="germanGrade">--</div>
          
          <div class="inline-block px-4 py-1.5 rounded-full text-sm font-bold bg-slate-800 text-slate-300 border border-slate-700" id="gradeText">
            --
          </div>

          <div class="mt-6 p-4 rounded-xl bg-white/5 text-left text-xs text-slate-400 space-y-1">
             <p><span class="text-brand font-bold">Formula:</span> Modified Bavarian Formula</p>
             <p class="font-mono">Grade = 1 + 3 × [(Nmax - N) / (Nmax - Nmin)]</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    function applyPreset(max, min) {
        document.getElementById('maxScore').value = max;
        document.getElementById('minScore').value = min;
        
        // Visual feedback
        const inputs = [document.getElementById('maxScore'), document.getElementById('minScore')];
        inputs.forEach(input => {
            input.classList.add('ring-2', 'ring-brand');
            setTimeout(() => input.classList.remove('ring-2', 'ring-brand'), 300);
        });
        
        // Hide result if preset changes
        document.getElementById('resultBox').classList.add('hidden');
    }

    function calculateGrade() {
      const Nmax = parseFloat(document.getElementById('maxScore').value);
      const Nmin = parseFloat(document.getElementById('minScore').value);
      const Nd = parseFloat(document.getElementById('myScore').value); // Your score
      const resultBox = document.getElementById('resultBox');
      
      // Validation
      if (isNaN(Nmax) || isNaN(Nmin) || isNaN(Nd)) { 
          alert("Please fill in all fields with valid numbers"); 
          return; 
      }
      if (Nmin >= Nmax) {
          alert("Minimum score cannot be greater than or equal to Maximum score");
          return;
      }
      if (Nd > Nmax) {
          alert("Your obtained score cannot be higher than the Maximum score");
          return;
      }

      // Modified Bavarian Formula
      // 1 + 3 * ((Nmax - Nd) / (Nmax - Nmin))
      let grade = 1 + 3 * ((Nmax - Nd) / (Nmax - Nmin));
      
      // Cap grading: German grades technically go up to 6.0 (Fail), but usually 4.0 is the cut-off for passing.
      // However, if someone inputs a score LOWER than passing, the formula naturally produces > 4.0.
      
      if (grade < 1) grade = 1.0; // Can't be better than 1.0
      
      let formattedGrade = grade.toFixed(2);
      
      // Interpretation
      let text = "";
      let colorClass = "";

      if (grade <= 1.5) { text = "Very Good (Sehr Gut)"; colorClass = "bg-green-500/20 text-green-400 border-green-500/30"; } 
      else if (grade <= 2.5) { text = "Good (Gut)"; colorClass = "bg-blue-500/20 text-blue-400 border-blue-500/30"; } 
      else if (grade <= 3.5) { text = "Satisfactory (Befriedigend)"; colorClass = "bg-yellow-500/20 text-yellow-400 border-yellow-500/30"; } 
      else if (grade <= 4.0) { text = "Sufficient (Ausreichend)"; colorClass = "bg-orange-500/20 text-orange-400 border-orange-500/30"; } 
      else { text = "Fail (Nicht bestanden)"; colorClass = "bg-red-500/20 text-red-400 border-red-500/30"; }

      document.getElementById('germanGrade').innerText = formattedGrade;
      const textEl = document.getElementById('gradeText');
      textEl.innerText = text;
      textEl.className = `inline-block px-4 py-1.5 rounded-full text-sm font-bold border ${colorClass}`;
      
      resultBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
